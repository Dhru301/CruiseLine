# ===============================================================
#  CruiseLine - Application Configuration (application.properties)
# ===============================================================
# NOTE: Sensitive values are read from environment variables with
# sane local-dev defaults after the ':'. In production, set the
# environment variables and never commit real secrets.
# ===============================================================

spring.application.name=cruiseline-backend
server.port=${SERVER_PORT:8082}
server.servlet.context-path=/

# ---------------------------------------------------------------
#  Database (MySQL)
# ---------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cruiseline_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool (production tuning)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ---------------------------------------------------------------
#  JPA / Hibernate
# ---------------------------------------------------------------
# Use 'update' for development. For production prefer 'validate'
# and manage schema via Flyway/Liquibase migrations (see notes).
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---------------------------------------------------------------
#  JWT
# ---------------------------------------------------------------
# IMPORTANT: replace the secret in production. Must be a Base64 or
# plain string of at least 256 bits (32+ chars) for HS256.
app.jwt.secret=${JWT_SECRET:Y2hhbmdlLXRoaXMtc2VjcmV0LWluLXByb2R1Y3Rpb24tMjU2LWJpdC1rZXktY3J1aXNlbGluZQ==}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXP:86400000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXP:604800000}
app.jwt.issuer=cruiseline

# ---------------------------------------------------------------
#  CORS (frontend origin)
# ---------------------------------------------------------------
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ---------------------------------------------------------------
#  Default admin (bootstrapped on first run if no users exist)
# ---------------------------------------------------------------
app.bootstrap.admin-email=${ADMIN_EMAIL:admin@cruiseline.com}
app.bootstrap.admin-password=${ADMIN_PASSWORD:Admin@12345}
app.bootstrap.admin-name=System Administrator

# ---------------------------------------------------------------
#  Jackson
# ---------------------------------------------------------------
spring.jackson.default-property-inclusion=non_null

# ---------------------------------------------------------------
#  Actuator (observability)
# ---------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ---------------------------------------------------------------
#  OpenAPI / Swagger
# ---------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ---------------------------------------------------------------
#  Logging
# ---------------------------------------------------------------
logging.level.root=INFO
logging.level.com.cruiseline=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=INFO
